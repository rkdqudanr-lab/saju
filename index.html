<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI 사주 × 점성술 상담 — 별숨" />
    <meta name="theme-color" content="#0D0B14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="별숨" />
    <title>별숨 🔮</title>
    <!-- Google tag (gtag.js) -->
    <script>
      (function() {
        var gaId = '%VITE_GA_ID%';
        if (!gaId || gaId === '%VITE_GA_ID%') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', gaId);
      })();
    </script>
  <style>
    body{margin:0;background:#0D0B14;color:#F0EBF8;font-family:-apple-system,sans-serif}
    #splash{position:fixed;inset:0;background:#0D0B14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .4s ease}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash-word{font-size:1.5rem;letter-spacing:.15em;color:#E8B048;font-weight:300}
    #splash-sub{font-size:.8rem;color:#6B6090;letter-spacing:.1em}
    #splash-dots{display:flex;gap:6px}
    #splash-dots span{width:5px;height:5px;border-radius:50%;background:#E8B04866;animation:splashPulse 1.2s ease-in-out infinite}
    #splash-dots span:nth-child(2){animation-delay:.2s}
    #splash-dots span:nth-child(3){animation-delay:.4s}
    @keyframes splashPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-word">byeolsoom</div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
      <div id="splash-sub">별숨과 연결 중 ✦</div>
    </div>
    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
